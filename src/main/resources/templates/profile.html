<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мій Профіль | Beauty Salon</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bright-pink: #ff1493;
            --soft-pink: #fce4ec;
            --done-green: #2ecc71;
            --bg-gradient: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            --text-dark: #2d3436;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--bg-gradient);
            margin: 0; padding: 20px; color: var(--text-dark);
        }

        .profile-container {
            max-width: 800px; margin: 40px auto;
            background: white; padding: 40px; border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
        }

        /* Шапка профілю */
        .profile-header {
            display: flex; align-items: flex-start; gap: 25px;
            margin-bottom: 40px; padding-bottom: 30px;
            border-bottom: 2px solid var(--soft-pink);
        }

        .avatar-square {
            width: 90px; height: 90px; background: var(--bright-pink);
            color: white; border-radius: 20px; display: flex;
            align-items: center; justify-content: center; font-size: 2.5rem; font-weight: 700;
            box-shadow: 0 10px 20px rgba(255, 20, 147, 0.2);
            text-transform: uppercase;
        }

        .profile-info { flex-grow: 1; }
        .profile-info h2 { margin: 0 0 5px 0; font-size: 1.8rem; }
        .profile-info p { margin: 5px 0; color: #636e72; font-weight: 500; }

        .btn-edit {
            background: #f1f2f6; color: var(--text-dark); border: none;
            padding: 8px 15px; border-radius: 10px; cursor: pointer;
            font-weight: 600; font-size: 0.85rem; margin-top: 10px; transition: 0.3s;
        }
        .btn-edit:hover { background: #dfe6e9; }

        /* Записи */
        .section-title { margin-bottom: 20px; color: #444; font-weight: 700; font-size: 1.3rem; }

        .appointment-card {
            background: #fff; border: 1px solid #eee; border-radius: 20px;
            padding: 25px; margin-bottom: 15px; display: flex;
            justify-content: space-between; align-items: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.02);
        }

        .appointment-card.past {
            background: #f8f9fa; border-left: 5px solid var(--done-green); opacity: 0.85;
        }

        .app-info p { margin: 5px 0; font-size: 0.95rem; }

        .actions { display: flex; gap: 10px; align-items: center; }

        .btn-cancel {
            background: #fff; color: #ff4d4d; border: 1px solid #ff4d4d;
            padding: 10px 18px; border-radius: 12px; cursor: pointer;
            font-weight: 600; font-family: 'Montserrat'; transition: 0.3s;
        }
        .btn-cancel:hover { background: #fff5f5; }

        .btn-reschedule {
            background: var(--soft-pink); color: var(--bright-pink); border: none;
            padding: 12px 20px; border-radius: 12px; cursor: pointer;
            font-weight: 600; font-size: 0.9rem; transition: 0.3s;
        }
        .btn-reschedule:hover { background: #f8bbd0; }

        .btn-review {
            background: var(--bright-pink); color: white; border: none;
            padding: 12px 20px; border-radius: 12px; cursor: pointer;
            font-weight: 700; text-decoration: none; font-size: 0.85rem;
            text-transform: uppercase; transition: 0.3s;
        }
        .btn-review:hover { background: #d11079; transform: translateY(-2px); }

        .status-done {
            display: inline-block; color: var(--done-green);
            font-weight: 700; font-size: 0.8rem; margin-top: 10px;
            text-transform: uppercase; letter-spacing: 0.5px;
        }

        .btn-logout {
            background: #f8f9fa; color: #666; border: 1px solid #ddd;
            padding: 15px; border-radius: 15px; cursor: pointer;
            font-weight: 600; font-family: 'Montserrat'; transition: 0.3s; width: 100%;
            margin-top: 20px;
        }
        .btn-logout:hover { background: #ffebee; color: #d32f2f; border-color: #d32f2f; }

        /* ПОПАПИ (Модальні вікна) */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center;
            backdrop-filter: blur(5px);
        }
        .modal-content {
            background: white; padding: 30px; border-radius: 20px; width: 90%; max-width: 400px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1); position: relative;
        }
        .close-modal {
            position: absolute; top: 15px; right: 20px; font-size: 1.5rem; cursor: pointer; color: #888;
        }
        .close-modal:hover { color: var(--bright-pink); }
        .modal-content input, .modal-content select {
            width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 10px;
            margin-top: 5px; margin-bottom: 15px; font-family: 'Montserrat'; box-sizing: border-box;
            font-size: 15px; color: var(--text-dark);
        }
        .modal-content input:focus { border-color: var(--bright-pink); outline: none; }
        .btn-save-modal {
            width: 100%; background: var(--bright-pink); color: white; border: none;
            padding: 15px; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.3s;
            font-family: 'Montserrat'; font-size: 15px;
        }
        .btn-save-modal:hover { background: #d11079; }

    </style>
</head>
<body>

<div class="profile-container">
    <div style="margin-bottom: 20px;">
        <a th:href="@{/}" style="text-decoration: none; color: var(--bright-pink); font-weight: 600;">
            <i class="fas fa-arrow-left"></i> На головну
        </a>
    </div>

    <div class="profile-header">
        <div class="avatar-square" th:text="${#strings.substring(client.name,0,1)}">К</div>
        <div class="profile-info">
            <h2 th:text="${client.name}">Ім'я Клієнта</h2>
            <p><i class="fas fa-envelope"></i> <span th:text="${client.email}">email@example.com</span></p>
            <p><i class="fas fa-phone"></i>
                <span th:text="${client.phone != null and !client.phone.isEmpty() ? client.phone : 'Номер не вказано'}"></span>
            </p>
            <button class="btn-edit" onclick="openEditProfileModal()">
                <i class="fas fa-pen"></i> Редагувати профіль
            </button>
        </div>
    </div>

    <h3 class="section-title">🕒 Активні записи</h3>
    <div th:if="${#lists.isEmpty(appointments.?[!isPast()])}" style="color: #999; margin-bottom: 30px;">
        Немає активних записів.
    </div>

    <div th:each="app : ${appointments}" th:if="${!app.isPast()}" class="appointment-card">
        <div class="app-info">
            <p><b><i class="fas fa-cut" style="color: var(--bright-pink); width: 20px;"></i> Послуга:</b> <span th:text="${app.service.title}"></span></p>
            <p><b><i class="far fa-clock" style="width: 20px;"></i> Коли:</b> <span th:text="${app.date}"></span> о <span th:text="${app.time}"></span></p>
            <p><b><i class="fas fa-magic" style="width: 20px;"></i> Майстер:</b> <span th:text="${app.master.name}"></span></p>
        </div>
        <div class="actions">
            <button class="btn-reschedule" th:onclick="'openRescheduleModal(' + ${app.id} + ', ' + ${app.master.id} + ', ' + ${app.service.id} + ')'">
                Перенести
            </button>
            <form th:action="@{/appointment/cancel}" method="post" style="margin: 0;">
                <input type="hidden" name="appointmentId" th:value="${app.id}">
                <button type="submit" class="btn-cancel" onclick="return confirm('Ви впевнені, що хочете скасувати візит?')">Скасувати</button>
            </form>
        </div>
    </div>

    <h3 class="section-title" style="margin-top: 40px;">✅ Історія візитів</h3>
    <div th:if="${#lists.isEmpty(appointments.?[isPast()])}" style="color: #999;">
        Історія візитів порожня.
    </div>

    <div th:each="app : ${appointments}" th:if="${app.isPast()}" class="appointment-card past">
        <div class="app-info">
            <p><b><i class="fas fa-cut" style="color: var(--bright-pink); width: 20px;"></i> Послуга:</b> <span th:text="${app.service.title}"></span></p>
            <p><b><i class="far fa-clock" style="width: 20px;"></i> Коли:</b> <span th:text="${app.date}"></span> о <span th:text="${app.time}"></span></p>
            <p><b><i class="fas fa-magic" style="width: 20px;"></i> Майстер:</b> <span th:text="${app.master.name}"></span></p>
            <div class="status-done"><i class="fas fa-check-double"></i> Виконано</div>
        </div>
        <div class="actions">
            <a th:href="@{/reviews/new(appointmentId=${app.id})}" class="btn-review">
                <i class="fas fa-star"></i> Залишити відгук
            </a>
        </div>
    </div>

    <hr style="border: 0; border-top: 1px solid #eee; margin: 40px 0;">

    <form id="logoutForm" th:action="@{/logout}" method="post">
        <button type="button" class="btn-logout" onclick="askBeforeLogout()">
            <i class="fas fa-sign-out-alt"></i> ВИЙТИ З АККАУНТУ
        </button>
    </form>
</div>

<div class="modal-overlay" id="rescheduleModal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeRescheduleModal()">&times;</span>
        <h3 style="margin-top: 0; text-align: center;">Оберіть новий час</h3>

        <form th:action="@{/appointment/quick-reschedule}" method="post">
            <input type="hidden" name="appointmentId" id="modalAppId">
            <input type="hidden" id="modalMasterId">
            <input type="hidden" id="modalServiceId">

            <label style="font-size: 0.85rem; font-weight: 600; color: #555;">Нова дата:</label>
            <input type="date" name="date" id="modalDate" required onchange="fetchModalSlots()">
            <div id="modalDateError" style="color: red; font-size: 0.8rem; display: none;">Вихідний день.</div>

            <label style="font-size: 0.85rem; font-weight: 600; color: #555;">Новий час:</label>
            <select name="time" id="modalTime" required>
                <option value="" disabled selected>Оберіть дату спочатку</option>
            </select>

            <button type="submit" class="btn-save-modal">Підтвердити перенесення</button>
        </form>
    </div>
</div>

<div class="modal-overlay" id="editProfileModal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeEditProfileModal()">&times;</span>
        <h3 style="margin-top: 0; text-align: center;">Редагування профілю</h3>

        <form th:action="@{/profile/edit}" method="post">
            <label style="font-size: 0.85rem; font-weight: 600; color: #555;">Ваше ім'я:</label>
            <input type="text" name="name" th:value="${client.name}" required>

            <label style="font-size: 0.85rem; font-weight: 600; color: #555;">Номер телефону:</label>
            <input type="tel" name="phone" th:value="${client.phone}" placeholder="+38 (0__) ___-__-__" oninput="formatPhone(this)" required>

            <button type="submit" class="btn-save-modal" style="margin-top: 10px;">Зберегти зміни</button>
        </form>
    </div>
</div>

<script>
    // Налаштування мінімальної дати (завтра) для попапу перенесення
    window.onload = function() {
        let tomorrow = new Date();
        tomorrow.setDate(tomorrow.getDate() + 1);
        document.getElementById('modalDate').min = tomorrow.toISOString().split('T')[0];
    };

    function askBeforeLogout() {
        if (confirm("Ви точно хочете вийти з аккаунту?")) {
            document.getElementById('logoutForm').submit();
        }
    }

    // Маска для телефону
    function formatPhone(input) {
        let matrix = "+38 (0__) ___-__-__", i = 0, def = matrix.replace(/\D/g, ""), val = input.value.replace(/\D/g, "");
        if (def.length >= val.length) val = def;
        input.value = matrix.replace(/./g, function(a) {
            return /[_\d]/.test(a) && i < val.length ? val.charAt(i++) : i >= val.length ? "" : a;
        });
    }

    // Логіка Попапу: РЕДАГУВАННЯ ПРОФІЛЮ
    function openEditProfileModal() {
        document.getElementById('editProfileModal').style.display = 'flex';
    }
    function closeEditProfileModal() {
        document.getElementById('editProfileModal').style.display = 'none';
    }

    // Логіка Попапу: ПЕРЕНЕСЕННЯ ВІЗИТУ
    function openRescheduleModal(appId, masterId, serviceId) {
        document.getElementById('modalAppId').value = appId;
        document.getElementById('modalMasterId').value = masterId;
        document.getElementById('modalServiceId').value = serviceId;
        document.getElementById('rescheduleModal').style.display = 'flex';
    }

    function closeRescheduleModal() {
        document.getElementById('rescheduleModal').style.display = 'none';
        document.getElementById('modalDate').value = '';
        document.getElementById('modalTime').innerHTML = '<option value="" disabled selected>Оберіть дату спочатку</option>';
    }

    function fetchModalSlots() {
        const mid = document.getElementById('modalMasterId').value;
        const sid = document.getElementById('modalServiceId').value;
        const dateInput = document.getElementById('modalDate');
        const ts = document.getElementById('modalTime');
        const error = document.getElementById('modalDateError');

        const d = new Date(dateInput.value).getUTCDay();
        if (d === 0 || d === 6) {
            error.style.display = "block";
            dateInput.value = "";
            ts.innerHTML = '<option value="" disabled selected>Оберіть робочий день</option>';
            return;
        } else {
            error.style.display = "none";
        }

        if (dateInput.value) {
            ts.innerHTML = '<option disabled selected>Шукаємо вікна...</option>';
            fetch(`/appointment/available-slots?masterId=${mid}&serviceId=${sid}&date=${dateInput.value}`)
                .then(res => res.json())
                .then(data => {
                    ts.innerHTML = '';
                    if (data.length === 0) {
                        ts.innerHTML = '<option disabled selected>Вільних місць немає</option>';
                    } else {
                        data.forEach(slot => {
                            let o = document.createElement('option');
                            o.value = o.text = slot;
                            ts.appendChild(o);
                        });
                    }
                });
        }
    }
</script>

</body>
</html>
