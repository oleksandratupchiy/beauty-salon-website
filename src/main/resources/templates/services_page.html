<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Прайс-лист | Beauty Salon</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bright-pink: #ff1493;
            --soft-pink: #fce4ec;
            --dark-grey: #333;
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #fdfbfb;
            margin: 0;
            padding-bottom: 50px;
            color: var(--dark-grey);
        }

        .simple-header {
            text-align: center;
            padding: 40px 20px;
            background: white;
            border-bottom: 1px solid var(--soft-pink);
            margin-bottom: 30px;
        }

        .simple-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            margin: 0;
        }

        .services-wrapper {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Картка категорії */
        .category-card {
            background: white;
            border-radius: 15px;
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            overflow: hidden;
            transition: var(--transition);
            border: 1px solid transparent;
        }

        .category-card:hover {
            border-color: var(--bright-pink);
        }

        .category-header {
            padding: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            background: white;
        }

        .category-header h2 {
            font-family: 'Playfair Display', serif;
            margin: 0;
            font-size: 1.4rem;
            display: flex;
            align-items: center;
        }

        .icon-main {
            color: var(--bright-pink);
            margin-right: 15px;
            width: 25px;
        }

        .chevron {
            transition: var(--transition);
            color: var(--bright-pink);
        }

        /* Контент списку */
        .category-content {
            max-height: 0;
            overflow: hidden;
            transition: var(--transition);
            background: #fafafa;
        }

        .category-card.active .category-content {
            max-height: 1200px; /* Достатньо для всіх послуг */
            padding-bottom: 10px;
        }

        .category-card.active .chevron {
            transform: rotate(180deg);
        }

        /* Послуга */
        .service-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 25px;
            border-bottom: 1px solid #eee;
            opacity: 0;
            transform: translateY(10px);
        }

        .category-card.active .service-item {
            animation: fadeIn 0.4s ease forwards;
        }

        @keyframes fadeIn {
            to { opacity: 1; transform: translateY(0); }
        }

        .service-info { flex: 1; }
        .service-title { font-weight: 600; display: block; }
        .duration { font-size: 0.8rem; color: #999; }
        .price-tag { font-weight: 700; color: var(--bright-pink); margin: 0 20px; }

        /* Кнопка Записатись */
        .book-btn {
            background: var(--bright-pink);
            color: white !important;
            border: none;
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: 0.3s;
        }

        .book-btn:hover {
            background: #d11079;
            box-shadow: 0 4px 10px rgba(255, 20, 147, 0.3);
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 30px;
            color: var(--dark-grey);
            text-decoration: none;
        }
    </style>
</head>
<body>

<header class="simple-header">
    <h1>Наші Послуги</h1>
    <p style="color: var(--bright-pink); letter-spacing: 2px; text-transform: uppercase; font-size: 0.8rem;">Оберіть свій ідеальний догляд</p>
</header>

<div class="services-wrapper">

    <div class="category-card">
        <div class="category-header" onclick="toggleCategory(this)">
            <h2><i class="fas fa-hand-sparkles icon-main"></i>Нігтьовий сервіс</h2>
            <i class="fas fa-chevron-down chevron"></i>
        </div>
        <div class="category-content">
            <div th:each="s : ${services}" th:if="${s.category == 'nails'}" class="service-item">
                <div class="service-info">
                    <span class="service-title" th:text="${s.title}"></span>
                    <span class="duration" th:text="${s.duration} + ' хв'"></span>
                </div>
                <span class="price-tag" th:text="${s.price} + ' грн'"></span>
                <a th:href="@{/appointment(serviceId=${s.id})}" class="book-btn">Записатись</a>
            </div>
        </div>
    </div>

    <div class="category-card">
        <div class="category-header" onclick="toggleCategory(this)">
            <h2><i class="fas fa-palette icon-main"></i>Фарбування та догляд</h2>
            <i class="fas fa-chevron-down chevron"></i>
        </div>
        <div class="category-content">
            <div th:each="s : ${services}" th:if="${s.category == 'colorist'}" class="service-item">
                <div class="service-info">
                    <span class="service-title" th:text="${s.title}"></span>
                    <span class="duration" th:text="${s.duration} + ' хв'"></span>
                </div>
                <span class="price-tag" th:text="${s.price} + ' грн'"></span>
                <a th:href="@{/appointment(serviceId=${s.id})}" class="book-btn">Записатись</a>
            </div>
        </div>
    </div>

    <div class="category-card">
        <div class="category-header" onclick="toggleCategory(this)">
            <h2><i class="fas fa-cut icon-main"></i>Стрижки (Жіночі та Чоловічі)</h2>
            <i class="fas fa-chevron-down chevron"></i>
        </div>
        <div class="category-content">
            <div th:each="s : ${services}" th:if="${s.category == 'female_cut' or s.category == 'male_cut'}" class="service-item">
                <div class="service-info">
                    <span class="service-title" th:text="${s.title}"></span>
                    <span class="duration" th:text="${s.duration} + ' хв'"></span>
                </div>
                <span class="price-tag" th:text="${s.price} + ' грн'"></span>
                <a th:href="@{/appointment(serviceId=${s.id})}" class="book-btn">Записатись</a>
            </div>
        </div>
    </div>

    <div class="category-card">
        <div class="category-header" onclick="toggleCategory(this)">
            <h2><i class="fas fa-spa icon-main"></i>Естетична косметологія</h2>
            <i class="fas fa-chevron-down chevron"></i>
        </div>
        <div class="category-content">
            <div th:each="s : ${services}" th:if="${s.category == 'cosmetician'}" class="service-item">
                <div class="service-info">
                    <span class="service-title" th:text="${s.title}"></span>
                    <span class="duration" th:text="${s.duration} + ' хв'"></span>
                </div>
                <span class="price-tag" th:text="${s.price} + ' грн'"></span>
                <a th:href="@{/appointment(serviceId=${s.id})}" class="book-btn">Записатись</a>
            </div>
        </div>
    </div>

    <div class="category-card">
        <div class="category-header" onclick="toggleCategory(this)">
            <h2><i class="fas fa-eye icon-main"></i>Перманентний макіяж</h2>
            <i class="fas fa-chevron-down chevron"></i>
        </div>
        <div class="category-content">
            <div th:each="s : ${services}" th:if="${s.category == 'permanent'}" class="service-item">
                <div class="service-info">
                    <span class="service-title" th:text="${s.title}"></span>
                    <span class="duration" th:text="${s.duration} + ' хв'"></span>
                </div>
                <span class="price-tag" th:text="${s.price} + ' грн'"></span>
                <a th:href="@{/appointment(serviceId=${s.id})}" class="book-btn">Записатись</a>
            </div>
        </div>
    </div>

    <a href="/" class="back-link"><i class="fas fa-arrow-left"></i> На головну</a>
</div>

<script>
    function toggleCategory(header) {
        const card = header.parentElement;
        card.classList.toggle('active');
    }
</script>

</body>
</html>
