<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Запис до салону | Beauty Salon</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bright-pink: #ff1493;
            --soft-pink: #fce4ec;
            --dark-grey: #333;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #fdfbfb;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0;
        }

        .booking-card {
            background: white; padding: 40px; border-radius: 30px;
            box-shadow: 0 20px 50px rgba(255, 20, 147, 0.1);
            width: 100%; max-width: 550px; border: 1px solid var(--soft-pink);
        }

        h2 { font-family: 'Playfair Display', serif; text-align: center; color: var(--dark-grey); font-size: 2rem; margin-bottom: 30px; }

        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.9rem; color: var(--dark-grey); }

        input, select {
            width: 100%; padding: 12px 15px; margin-bottom: 20px;
            border: 1px solid #ddd; border-radius: 12px; font-family: 'Montserrat', sans-serif;
            box-sizing: border-box; outline: none; transition: 0.3s;
        }

        input:focus, select:focus { border-color: var(--bright-pink); box-shadow: 0 0 8px rgba(255, 20, 147, 0.1); }

        .row { display: flex; gap: 15px; }
        .row div { flex: 1; }

        .submit-btn {
            width: 100%; background: var(--bright-pink); color: white; border: none;
            padding: 15px; border-radius: 15px; font-weight: 700; font-size: 1rem;
            cursor: pointer; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px;
            margin-top: 10px;
        }
        .submit-btn:hover { background: #d11079; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255, 20, 147, 0.3); }

        .error-msg { color: #d32f2f; font-size: 0.75rem; margin-top: -15px; margin-bottom: 15px; display: none; }
        .success-msg { background: #e8f5e9; color: #2e7d32; padding: 15px; border-radius: 12px; text-align: center; margin-bottom: 20px; font-weight: 600; }
        .back-link { display: block; text-align: center; margin-top: 20px; text-decoration: none; color: #999; font-size: 0.85rem; }
    </style>
</head>
<body>

<div class="booking-card">
    <h2>Оформлення візиту</h2>

    <div th:if="${param.success}" class="success-msg">
        <i class="fas fa-check-circle"></i> Ви успішно записані!
    </div>

    <form th:action="@{/appointment/save}" method="post" onsubmit="return validateForm()">

        <label>Ваше ім'я</label>
        <input type="text" name="clientName" placeholder="Введіть ваше ім'я" required>

        <label>Номер телефону</label>
        <input type="tel"
               name="clientPhone"
               id="phoneInput"
               placeholder="+38 (0__) ___-__-__"
               oninput="formatPhone(this)"
               onfocus="if(this.value==='') this.value='+38 (0'"
               required>
        <div id="phoneError" class="error-msg">Потрібно заповнити номер повністю.</div>

        <label>Оберіть послугу</label>
        <select name="serviceId" id="serviceSelect" onchange="filterMasters()" required>
            <option value="" disabled th:selected="${selectedServiceId == null}">-- Оберіть послугу --</option>
            <option th:each="s : ${services}"
                    th:value="${s.id}"
                    th:data-category="${s.category}"
                    th:text="${s.title + ' — ' + s.price + ' грн'}"
                    th:selected="${s.id == selectedServiceId}">
            </option>
        </select>

        <label>Оберіть майстра</label>
        <select name="masterId" id="masterSelect" required>
            <option value="" id="masterDefaultOption" disabled selected>-- Спочатку оберіть послугу --</option>
            <option th:each="m : ${masters}"
                    th:value="${m.id}"
                    th:data-spec="${m.specialization}"
                    th:text="${m.name}">
            </option>
        </select>

        <div class="row">
            <div>
                <label>Дата (Пн-Пт)</label>
                <input type="date" name="date" id="dateInput" onchange="checkWeekend()" required>
                <div id="dateError" class="error-msg">Ми не працюємо у вихідні.</div>
            </div>
            <div>
                <label>Час візиту</label>
                <select name="time" id="timeSelect" required>
                    <option value="" disabled selected>-- : --</option>
                    <option value="10:00">10:00</option>
                    <option value="12:00">12:00</option>
                    <option value="14:00">14:00</option>
                    <option value="16:00">16:00</option>
                    <option value="17:00">17:00</option>
                </select>
            </div>
        </div>

        <button type="submit" class="submit-btn">Забронювати</button>
        <a href="/services" class="back-link"><i class="fas fa-chevron-left"></i> Назад до послуг</a>
    </form>
</div>



<script>
    // --- 1. ПРАВИЛЬНА МАСКА ТЕЛЕФОНУ ---
    function formatPhone(input) {
        let matrix = "+38 (0__) ___-__-__";
        let i = 0;
        let def = matrix.replace(/\D/g, "");
        let val = input.value.replace(/\D/g, "");

        if (def.length >= val.length) val = def;

        input.value = matrix.replace(/./g, function(a) {
            return /[_\d]/.test(a) && i < val.length ? val.charAt(i++) : i >= val.length ? "" : a;
        });

        if (input.value.length < 6) {
            input.value = "+38 (0";
        }
    }

    // --- 2. ФІЛЬТРАЦІЯ МАЙСТРІВ ---
    function filterMasters() {
        const serviceSelect = document.getElementById('serviceSelect');
        const masterSelect = document.getElementById('masterSelect');
        const defaultOpt = document.getElementById('masterDefaultOption');

        const selectedOption = serviceSelect.options[serviceSelect.selectedIndex];
        if (!selectedOption || selectedOption.value === "") return;

        const category = selectedOption.getAttribute('data-category');

        // Оновлюємо текст дефолтного пункту
        defaultOpt.text = "-- Оберіть майстра --";
        masterSelect.selectedIndex = 0;

        Array.from(masterSelect.options).forEach(option => {
            if (option.id === "masterDefaultOption") return;

            const masterSpec = option.getAttribute('data-spec');
            if (masterSpec === category) {
                option.style.display = "block";
                option.disabled = false;
            } else {
                option.style.display = "none";
                option.disabled = true;
            }
        });
    }

    // --- 3. ВАЛІДАЦІЯ ТА ВИХІДНІ ---
    function checkWeekend() {
        const dateInput = document.getElementById('dateInput');
        const dateError = document.getElementById('dateError');
        const date = new Date(dateInput.value);
        const day = date.getUTCDay();

        if (day === 0 || day === 6) {
            dateError.style.display = "block";
            dateInput.value = "";
        } else {
            dateError.style.display = "none";
        }
    }

    function validateForm() {
        const phone = document.getElementById('phoneInput').value;
        const dateInput = document.getElementById('dateInput').value;

        if (phone.length < 19) {
            alert("Введіть повний номер телефону: +38 (0XX) XXX-XX-XX");
            return false;
        }
        if (!dateInput) {
            alert("Будь ласка, оберіть робочий день");
            return false;
        }
        return true;
    }

    // --- ПРИ ЗАВАНТАЖЕННІ ---
    window.onload = function() {
        // Обмеження дати (не раніше сьогодні)
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('dateInput').setAttribute('min', today);

        // Якщо послуга вже прийшла з прайсу
        if (document.getElementById('serviceSelect').value !== "") {
            filterMasters();
        }
    };
</script>
</body>
</html>
