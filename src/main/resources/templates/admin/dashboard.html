<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Панель Адміністратора | Beauty Salon</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
    <script type="text/javascript">
        google.charts.load('current', {'packages':['corechart']});
        google.charts.setOnLoadCallback(drawCharts);

        function drawCharts() {
            try {
                // Читаємо дані з прихованих блоків (це найбезпечніший спосіб)
                var chartDataRaw = document.getElementById('rawChartData').textContent;
                var masterDataRaw = document.getElementById('rawMasterData').textContent;

                var data1 = google.visualization.arrayToDataTable(JSON.parse(chartDataRaw));
                var options1 = {
                    title: 'Популярність послуг (кількість записів)',
                    pieHole: 0.4,
                    height: 450,
                    chartArea: {width: '90%', height: '80%'},
                    colors: ['#4e73df', '#1cc88a', '#36b9cc', '#f6c23e', '#e74a3b', '#858796']
                };
                new google.visualization.PieChart(document.getElementById('chart_pop')).draw(data1, options1);

                var data2 = google.visualization.arrayToDataTable(JSON.parse(masterDataRaw));
                var options2 = {
                    title: 'Рейтинг майстрів (від найкращого)',
                    legend: 'none',
                    vAxis: {minValue: 0, maxValue: 5},
                    height: 450,
                    chartArea: {width: '80%', height: '70%'}
                };
                new google.visualization.ColumnChart(document.getElementById('chart_masters')).draw(data2, options2);
            } catch (error) {
                console.error("Помилка відмальовки графіків:", error);
            }
        }
    </script>

    <style>
        :root { --pink: #ef629f; --dark: #333; --bg: #f8f9fa; --text-muted: #858796; }
        body { font-family: 'Montserrat', sans-serif; background: var(--bg); margin: 0; display: flex; }

        .sidebar { width: 260px; height: 100vh; background: var(--dark); color: white; padding: 25px; position: fixed; box-sizing: border-box; display: flex; flex-direction: column; }
        .sidebar-header { margin-bottom: 40px; padding-left: 15px; }
        .sidebar h2 { color: var(--pink); font-size: 1.4rem; margin: 0; text-transform: uppercase; letter-spacing: 2px; }

        .sidebar-menu { flex-grow: 1; }
        .sidebar a { display: flex; align-items: center; color: #bbb; text-decoration: none; padding: 15px; border-radius: 10px; transition: 0.3s; margin-bottom: 5px; }
        .sidebar a:hover, .sidebar a.active { background: rgba(239, 98, 159, 0.1); color: var(--pink); }
        .sidebar i { margin-right: 15px; width: 20px; text-align: center; font-size: 1.1rem; }

        .sidebar-footer { margin-top: auto; border-top: 1px solid #444; padding-top: 15px; }

        .main { margin-left: 260px; padding: 40px; width: calc(100% - 280px); box-sizing: border-box; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding-bottom: 15px; border-bottom: 1px solid #e3e6f0; }
        .header h1 { margin: 0; font-size: 1.75rem; color: var(--dark); }

        .welcome-msg { color: var(--text-muted); font-size: 1rem; font-weight: 400; }

        .header-actions { display: flex; gap: 10px; }
        .btn-common { padding: 12px 25px; border-radius: 12px; text-decoration: none; font-weight: 600; display: inline-flex; align-items: center; gap: 10px; transition: 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .btn-port { background: #4e73df; color: white; }
        .btn-common:hover { transform: translateY(-2px); opacity: 0.9; }

        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 25px; margin-bottom: 40px; }
        .stat-card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); text-align: center; border-left: 5px solid transparent; transition: 0.3s; }
        .stat-card:hover { transform: translateY(-5px); }
        .stat-card h3 { color: var(--text-muted); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; margin-top: 0; margin-bottom: 15px; }
        .stat-card p { font-size: 2.5rem; font-weight: 700; color: var(--dark); margin: 0; }

        .card-services { border-left-color: #4e73df; }
        .card-masters { border-left-color: #1cc88a; }
        .card-appointments { border-left-color: #f6c23e; }

        .chart-box { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); margin-bottom: 30px; }
    </style>
</head>
<body>

<div id="rawChartData" style="display: none;" th:utext="${chartData}"></div>
<div id="rawMasterData" style="display: none;" th:utext="${masterData}"></div>

<div class="sidebar">
    <div class="sidebar-header">
        <h2>Beauty Admin</h2>
    </div>
    <div class="sidebar-menu">
        <a th:href="@{/admin/dashboard}" class="active"><i class="fas fa-chart-line"></i> Аналітика</a>
        <a th:href="@{/admin/masters}"><i class="fas fa-user-tie"></i> Майстри</a>
        <a th:href="@{/admin/services}"><i class="fas fa-spa"></i> Послуги</a>
        <a th:href="@{/admin/appointments}"><i class="fas fa-calendar-check"></i> Записи</a>
        <a th:href="@{/admin/port}"><i class="fas fa-file-import"></i> Порт даних</a>
    </div>
    <div class="sidebar-footer">
        <a th:href="@{/logout}" style="color: #e74a3b;"><i class="fas fa-sign-out-alt"></i> Вихід</a>
    </div>
</div>

<div class="main">
    <div class="header">
        <div>
            <h1>Аналітика салону</h1>
            <div class="welcome-msg" th:text="${welcomeMessage}">Вітаємо!</div>
        </div>
        <div class="header-actions">
            <a th:href="@{/admin/port}" class="btn-common btn-port"><i class="fas fa-exchange-alt"></i> Імпорт/Експорт</a>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-card card-services"><h3>Послуг</h3><p th:text="${servicesCount}">0</p></div>
        <div class="stat-card card-masters"><h3>Майстрів</h3><p th:text="${mastersCount}">0</p></div>
        <div class="stat-card card-appointments"><h3>Записів</h3><p th:text="${appointmentsCount}">0</p></div>
    </div>

    <div class="chart-box">
        <div id="chart_pop"></div>
    </div>
    <div class="chart-box">
        <div id="chart_masters"></div>
    </div>
</div>

</body>
</html>
