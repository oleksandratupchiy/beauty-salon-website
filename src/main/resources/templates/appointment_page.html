<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Запис до салону | Beauty Salon</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --primary-pink: #ff1493;
            --hover-pink: #ff69b4;
            --light-pink: #fff0f6;
            --text-dark: #2d3436;
            --border-color: #dfe6e9;
            --bg-gradient: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            --warning-color: #f39c12;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--bg-gradient);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: var(--text-dark);
        }

        .booking-card {
            background: #ffffff;
            padding: 40px 50px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(255, 20, 147, 0.1);
            width: 100%;
            max-width: 500px;
            border: 1px solid rgba(255, 20, 147, 0.05);
        }

        h2 {
            font-weight: 700;
            text-align: center;
            color: var(--text-dark);
            font-size: 24px;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 13px;
            color: #636e72;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input, select {
            width: 100%;
            padding: 14px 18px;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-family: 'Montserrat', sans-serif;
            font-size: 15px;
            font-weight: 500;
            color: var(--text-dark);
            transition: all 0.3s ease;
            box-sizing: border-box;
            background-color: #fafafa;
        }

        input:focus, select:focus {
            border-color: var(--primary-pink);
            background-color: #fff;
            outline: none;
            box-shadow: 0 0 10px rgba(255, 20, 147, 0.1);
        }

        input[readonly] {
            background-color: #f1f2f6;
            border-color: #f1f2f6;
            color: #b2bec3;
            cursor: not-allowed;
        }

        .row {
            display: flex;
            gap: 20px;
        }

        .row .form-group {
            flex: 1;
        }

        .warning-box {
            background-color: #fcf3cf;
            border-left: 5px solid var(--warning-color);
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 8px;
            font-size: 14px;
            line-height: 1.5;
        }

        .warning-box p {
            margin: 0 0 10px 0;
            font-weight: 600;
            color: #d35400;
        }

        .checkbox-container {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            font-weight: 600;
            color: #d35400;
            cursor: pointer;
        }

        .checkbox-container input[type="checkbox"] {
            width: auto;
            transform: scale(1.2);
            cursor: pointer;
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: var(--primary-pink);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            box-shadow: 0 8px 15px rgba(255, 20, 147, 0.2);
        }

        .submit-btn:hover {
            background: var(--hover-pink);
            transform: translateY(-2px);
            box-shadow: 0 12px 20px rgba(255, 20, 147, 0.3);
        }

        .error-msg {
            color: #e74c3c;
            font-size: 12px;
            font-weight: 500;
            margin-top: 5px;
            display: none;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 25px;
            text-decoration: none;
            color: #b2bec3;
            font-size: 13px;
            font-weight: 600;
            transition: color 0.3s;
        }

        .back-link:hover {
            color: var(--primary-pink);
        }
    </style>
</head>
<body>

<div class="booking-card">
    <h2 th:text="${rescheduleId != null ? 'Перенесення візиту' : 'Запис на візит'}">Запис на візит</h2>

    <form th:action="@{/appointment/save}" method="post" onsubmit="return validateForm()">

        <input type="hidden" name="rescheduleId" th:if="${rescheduleId != null}" th:value="${rescheduleId}">

        <div class="warning-box" th:if="${warning == 'duplicate'}">
            <p><i class="fas fa-exclamation-triangle"></i> Увага! У вас вже є запис на обраний час (<span th:text="${tempDate}"></span> о <span th:text="${tempTime}"></span>).</p>
            <label class="checkbox-container">
                <input type="checkbox" name="forceSave" value="true">
                Так, я хочу додати ще одну процедуру на цей час
            </label>
        </div>

        <div class="form-group">
            <label>Ваше ім'я</label>
            <input type="text" th:value="${clientName}" readonly required>
        </div>

        <div class="form-group">
            <label>Номер телефону</label>
            <input type="tel" id="phoneInput" name="clientPhone"
                   th:value="${clientPhone}"
                   placeholder="+38 (0__) ___-__-__" oninput="formatPhone(this)" required>
        </div>

        <div class="form-group">
            <label>Послуга</label>
            <select name="serviceId" id="serviceSelect" onchange="filterMasters(); refreshSlots();" required>
                <option value="" disabled th:selected="${selectedServiceId == null}">Оберіть процедуру</option>
                <option th:each="s : ${services}"
                        th:value="${s.id}"
                        th:data-category="${s.category}"
                        th:text="${s.title + ' — ' + s.price + ' грн'}"
                        th:selected="${s.id == selectedServiceId}"></option>
            </select>
        </div>

        <div class="form-group">
            <label>Майстер</label>
            <select name="masterId" id="masterSelect" onchange="filterServices(); refreshSlots();" required>
                <option value="" id="masterDefaultOption" disabled th:selected="${selectedMasterId == null}">Оберіть майстра</option>
                <option th:each="m : ${masters}"
                        th:value="${m.id}"
                        th:data-spec="${m.specialization}"
                        th:text="${m.name}"
                        th:selected="${m.id == selectedMasterId}"></option>
            </select>
        </div>

        <div class="row">
            <div class="form-group">
                <label>Дата</label>
                <input type="date" name="date" id="dateInput" th:min="${minDate}" th:max="${maxDate}"
                       th:value="${tempDate}" onchange="checkWeekend(); refreshSlots();" required>
                <div id="dateError" class="error-msg">Вихідний день.</div>
            </div>
            <div class="form-group">
                <label>Час</label>
                <select name="time" id="timeSelect" required>
                    <option th:if="${tempTime != null}" th:value="${tempTime}" th:text="${tempTime}" selected></option>
                    <option th:if="${tempTime == null}" value="" disabled selected>-- : --</option>
                </select>
            </div>
        </div>

        <button type="submit" class="submit-btn" th:text="${rescheduleId != null ? 'Зберегти зміни' : 'Забронювати час'}">Забронювати</button>

        <a th:href="@{/profile}" class="back-link">
            <i class="fas fa-arrow-left"></i> Назад до профілю
        </a>
    </form>
</div>

<script>
    function formatPhone(input) {
        let matrix = "+38 (0__) ___-__-__", i = 0, def = matrix.replace(/\D/g, ""), val = input.value.replace(/\D/g, "");
        if (def.length >= val.length) val = def;
        input.value = matrix.replace(/./g, function(a) {
            return /[_\d]/.test(a) && i < val.length ? val.charAt(i++) : i >= val.length ? "" : a;
        });
    }

    // Якщо клієнт обрав послугу -> фільтруємо майстрів
    function filterMasters() {
        const s = document.getElementById('serviceSelect'), m = document.getElementById('masterSelect');
        const sel = s.options[s.selectedIndex];
        if (!sel || sel.value === "") return;
        const cat = sel.getAttribute('data-category');

        let currentMaster = m.value;
        let firstMatch = null;
        let matchFound = false;

        Array.from(m.options).forEach(o => {
            if (o.id === "masterDefaultOption") return;
            if (o.getAttribute('data-spec') === cat) {
                o.style.display = "block";
                if (!firstMatch) firstMatch = o.value;
                if (o.value === currentMaster) matchFound = true;
            } else {
                o.style.display = "none";
            }
        });

        if (!matchFound && firstMatch) {
            m.value = firstMatch;
        } else if (!matchFound && !firstMatch) {
            m.value = "";
        }

        document.getElementById('timeSelect').innerHTML = '<option value="" disabled selected>-- : --</option>';
    }

    // НОВЕ: Якщо клієнт обрав майстра -> фільтруємо послуги
    function filterServices() {
        const s = document.getElementById('serviceSelect'), m = document.getElementById('masterSelect');
        const sel = m.options[m.selectedIndex];
        if (!sel || sel.value === "") return;
        const spec = sel.getAttribute('data-spec');

        let currentService = s.value;
        let firstMatch = null;
        let matchFound = false;

        Array.from(s.options).forEach(o => {
            if (o.value === "") return; // Ігноруємо "Оберіть процедуру"
            if (o.getAttribute('data-category') === spec) {
                o.style.display = "block";
                if (!firstMatch) firstMatch = o.value;
                if (o.value === currentService) matchFound = true;
            } else {
                o.style.display = "none";
            }
        });

        // Якщо поточна послуга не підходить, ставимо першу доступну
        if (!matchFound && firstMatch) {
            s.value = firstMatch;
        } else if (!matchFound && !firstMatch) {
            s.value = "";
        }

        document.getElementById('timeSelect').innerHTML = '<option value="" disabled selected>-- : --</option>';
    }

    function refreshSlots() {
        const mid = document.getElementById('masterSelect').value;
        const sid = document.getElementById('serviceSelect').value;
        const date = document.getElementById('dateInput').value;
        const ts = document.getElementById('timeSelect');

        const tempTime = "[[${tempTime}]]";

        if (mid && sid && date) {
            ts.innerHTML = '<option disabled selected>Шукаємо вікна...</option>';
            fetch(`/appointment/available-slots?masterId=${mid}&serviceId=${sid}&date=${date}`)
                .then(res => res.json())
                .then(data => {
                    ts.innerHTML = '';
                    if (data.length === 0) {
                        ts.innerHTML = '<option disabled selected>Вільних місць немає</option>';
                    } else {
                        data.forEach(slot => {
                            let o = document.createElement('option');
                            o.value = o.text = slot;
                            if (slot === tempTime) o.selected = true;
                            ts.appendChild(o);
                        });
                    }
                });
        }
    }

    function checkWeekend() {
        const d = new Date(document.getElementById('dateInput').value).getUTCDay();
        const error = document.getElementById('dateError');
        if (d === 0 || d === 6) {
            error.style.display = "block";
            document.getElementById('dateInput').value = "";
        } else {
            error.style.display = "none";
        }
    }

    function validateForm() {
        if (document.getElementById('phoneInput').value.length < 19) {
            alert("Будь ласка, заповніть номер телефону повністю.");
            return false;
        }
        return true;
    }

    // НОВЕ: Розумне завантаження
    window.onload = function() {
        const sVal = document.getElementById('serviceSelect').value;
        const mVal = document.getElementById('masterSelect').value;

        // Якщо ми прийшли від майстра, спочатку фільтруємо послуги!
        if (mVal) {
            filterServices();
        } else if (sVal) {
            filterMasters();
        }

        if (document.getElementById('dateInput').value) refreshSlots();
    };
</script>
</body>
</html>
