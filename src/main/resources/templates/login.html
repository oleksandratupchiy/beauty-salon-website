<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Вхід | Beauty Salon</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #e3f2fd 0%, #fce4ec 100%);
            display: flex; justify-content: center; align-items: center;
            height: 100vh; margin: 0;
        }
        .auth-card {
            background: white; padding: 40px; border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 350px; text-align: center;
        }
        h2 { text-transform: uppercase; letter-spacing: 2px; margin-bottom: 25px; }
        input {
            width: 100%; padding: 12px; margin-bottom: 15px;
            border: 1px solid #ddd; border-radius: 12px; box-sizing: border-box; outline: none;
        }
        input:focus { border-color: #ff1493; }
        .btn-auth {
            width: 100%; background: #333; color: white; padding: 12px;
            border: none; border-radius: 12px; cursor: pointer; font-weight: bold; transition: 0.3s;
        }
        .btn-auth:hover { background: #ff1493; }
        .switch-text { margin-top: 20px; font-size: 0.85em; color: #777; }
        .switch-text a { color: #ff1493; text-decoration: none; font-weight: bold; }
        .error { color: red; font-size: 0.8em; margin-bottom: 10px; }
    </style>
</head>
<body>
<div class="auth-card">
    <h2>Вхід</h2>
    <div th:if="${param.error}" class="error">Невірний логін або пароль</div>

    <form th:action="@{/login}" method="post">
        <input type="text" name="username" placeholder="Логін (Email)" required>
        <input type="password" name="password" placeholder="Пароль" required>
        <button type="submit" class="btn-auth">УВІЙТИ</button>
    </form>

    <div class="switch-text">
        Вперше тут? <a th:href="@{/register}">Зареєструватися</a>
    </div>
</div>
</body>
</html>
