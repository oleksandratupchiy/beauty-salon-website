<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Новий пароль | DUNYA BEAUTY</title>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --card-bg: rgba(255,255,255,0.6); --card-border: rgba(255,255,255,0.85); --accent: #75809C; --text: #323232; --text-muted: #8E99A7; --danger: #e74c3c; --radius: 22px; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background: #dcdddd; min-height: 100vh; display: flex; align-items: center; justify-content: center; color: var(--text); }
        .auth-wrapper { width: 100%; max-width: 400px; margin: auto; padding: 20px; }
        .auth-card { background: var(--card-bg); backdrop-filter: blur(16px); border: 1px solid var(--card-border); padding: 45px 40px; border-radius: var(--radius); text-align: center; box-shadow: 0 8px 32px rgba(117, 128, 156, 0.12); }
        .logo { font-family: 'Bricolage Grotesque', sans-serif; font-size: 22px; font-weight: 700; text-transform: uppercase; margin-bottom: 25px; color: var(--text); }
        .logo span { color: var(--accent); }
        h2 { font-family: 'Bricolage Grotesque', sans-serif; font-size: 1.4rem; margin-bottom: 10px; font-weight: 600; }
        .sub-text { font-size: 13px; color: var(--text-muted); margin-bottom: 25px; line-height: 1.5; }

        .input-group { position: relative; width: 100%; margin-bottom: 15px; }
        input { width: 100%; padding: 15px; padding-right: 45px; border: 1px solid rgba(142, 153, 167, 0.3); border-radius: 12px; background: rgba(255,255,255,0.7); outline: none; font-family: 'Montserrat', sans-serif; font-size: 14px; transition: 0.3s; }
        input:focus { border-color: var(--accent); background: #fff; }

        .toggle-password { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--text-muted); font-size: 16px; }

        .btn-auth { width: 100%; background: var(--text); color: white; padding: 15px; border: none; border-radius: 50px; cursor: pointer; font-weight: 600; font-family: 'Montserrat', sans-serif; font-size: 13px; text-transform: uppercase; margin-top: 10px; transition: 0.3s; }
        .btn-auth:hover:not(:disabled) { background: var(--accent); transform: translateY(-2px); }
        .btn-auth:disabled { opacity: 0.5; cursor: not-allowed; background: #999; }

        .alert { font-size: 12px; font-weight: 600; padding: 12px; border-radius: 12px; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; gap: 8px; text-align: left; line-height: 1.4; }
        .error { background: rgba(231, 76, 60, 0.1); color: var(--danger); border: 1px solid rgba(231, 76, 60, 0.2); }

        #match-msg { font-size: 11px; font-weight: 700; margin-bottom: 15px; text-align: left; padding-left: 5px; display: none; }
    </style>
</head>
<body>
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="logo"><span>Dunya</span> Beauty</div>
        <h2>Новий пароль</h2>
        <p class="sub-text">Придумайте новий надійний пароль для вашого акаунту.</p>

        <div th:if="${param.short_password}" class="alert error">
            <i class="fas fa-exclamation-circle"></i> Пароль має містити щонайменше 8 символів.
        </div>

        <form th:action="@{/reset-password}" method="post" id="resetForm">
            <input type="hidden" name="token" th:value="${token}">

            <div class="input-group">
                <input type="password" id="password" name="password" placeholder="Новий пароль (мін. 8 символів)" required minlength="8">
                <i class="fas fa-eye toggle-password" onclick="togglePassword('password', this)"></i>
            </div>

            <div class="input-group">
                <input type="password" id="confirmPassword" placeholder="Підтвердіть новий пароль" required>
                <i class="fas fa-eye toggle-password" onclick="togglePassword('confirmPassword', this)"></i>
            </div>

            <p id="match-msg"></p>

            <button type="submit" class="btn-auth" id="submitBtn">Зберегти новий пароль</button>
        </form>
    </div>
</div>

<script>
    const password = document.getElementById('password');
    const confirmPassword = document.getElementById('confirmPassword');
    const msg = document.getElementById('match-msg');
    const btn = document.getElementById('submitBtn');

    function checkMatch() {
        if (confirmPassword.value === "") {
            msg.style.display = 'none';
            btn.disabled = false;
            return;
        }

        msg.style.display = 'block';
        if (password.value === confirmPassword.value) {
            msg.textContent = "✓ Паролі збігаються";
            msg.style.color = "#27ae60";
            btn.disabled = false;
        } else {
            msg.textContent = "✕ Паролі не збігаються";
            msg.style.color = "#e74c3c";
            btn.disabled = true;
        }
    }

    password.addEventListener('input', checkMatch);
    confirmPassword.addEventListener('input', checkMatch);

    function togglePassword(id, icon) {
        const field = document.getElementById(id);
        if (field.type === 'password') {
            field.type = 'text';
            icon.classList.replace('fa-eye', 'fa-eye-slash');
        } else {
            field.type = 'password';
            icon.classList.replace('fa-eye-slash', 'fa-eye');
        }
    }
</script>
</body>
</html>
