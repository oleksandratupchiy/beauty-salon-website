<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Наші Послуги | DUNYA BEAUTY</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            /* НАША ПАЛІТРА */
            --bg: #dcdddd;
            --sidebar-bg: rgba(255,255,255,0.55);
            --card-bg: rgba(255,255,255,0.6);
            --card-border: rgba(255,255,255,0.85);

            --accent: #75809C;
            --accent2: #8E99A7;
            --accent3: #323232;

            --text: #323232;
            --text-muted: #8E99A7;

            --shadow: 0 8px 32px rgba(117, 128, 156, 0.12);
            --radius: 22px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--bg);
            background-image:
                    radial-gradient(ellipse at 0% 0%, rgba(117, 128, 156, 0.25) 0%, transparent 55%),
                    radial-gradient(ellipse at 100% 100%, rgba(50, 50, 50, 0.12) 0%, transparent 55%),
                    radial-gradient(ellipse at 60% 20%, rgba(142, 153, 167, 0.2) 0%, transparent 40%);
            min-height: 100vh;
            display: flex;
            overflow-x: hidden;
            color: var(--text);
        }

        /* ── SIDEBAR ── */
        .sidebar {
            width: 220px; min-height: 100vh; background: var(--sidebar-bg);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-right: 1px solid rgba(255,255,255,0.7); display: flex; flex-direction: column;
            padding: 36px 20px; position: sticky; top: 0; height: 100vh;
            box-shadow: 2px 0 24px rgba(117, 128, 156, 0.05); z-index: 100; flex-shrink: 0;
        }
        .sidebar-logo {
            font-family: 'Bricolage Grotesque', sans-serif; font-size: 19px; font-weight: 700;
            letter-spacing: 0.05em; color: var(--text); text-transform: uppercase; margin-bottom: 36px;
            display: flex; align-items: center; gap: 8px;
        }
        .sidebar-logo span { color: var(--accent); }
        .sidebar-profile {
            display: flex; flex-direction: column; align-items: center; margin-bottom: 36px; gap: 8px;
            text-decoration: none; padding: 15px 10px; border-radius: 20px; transition: all 0.3s ease;
            border: 1px solid transparent; cursor: pointer;
        }
        .sidebar-profile:hover {
            background: rgba(255, 255, 255, 0.6); border-color: var(--card-border);
            transform: translateY(-3px); box-shadow: 0 8px 20px rgba(117, 128, 156, 0.15);
        }
        .avatar {
            width: 64px; height: 64px; border-radius: 50%;
            background: linear-gradient(135deg, var(--accent2), var(--accent));
            display: flex; align-items: center; justify-content: center; font-size: 24px; color: #fff;
            box-shadow: 0 4px 16px rgba(117, 128, 156, 0.3); transition: transform 0.3s;
        }
        .sidebar-profile:hover .avatar { transform: scale(1.05); }
        .profile-name { font-size: 14px; font-weight: 700; color: var(--text); text-align: center; }
        .profile-sub { font-size: 11px; font-weight: 600; color: var(--accent); text-transform: uppercase; letter-spacing: 0.5px; }
        .sidebar-nav { display: flex; flex-direction: column; gap: 4px; flex: 1; }
        .nav-item {
            display: flex; align-items: center; gap: 12px; padding: 11px 14px; border-radius: 12px;
            color: var(--text-muted); font-size: 13px; font-weight: 500; text-decoration: none; transition: all 0.2s; cursor: pointer;
        }
        .nav-item:hover, .nav-item.active {
            background: rgba(255,255,255,0.75); color: var(--text); box-shadow: 0 2px 12px rgba(117, 128, 156, 0.1);
        }
        .nav-item.active { color: var(--accent); }
        .nav-item i { width: 18px; text-align: center; font-size: 14px; }
        .sidebar-social {
            display: flex; gap: 14px; margin-top: 24px; padding-top: 20px; border-top: 1px solid rgba(142, 153, 167, 0.2);
        }
        .sidebar-social a { color: var(--text-muted); font-size: 15px; transition: color 0.2s; text-decoration: none; }
        .sidebar-social a:hover { color: var(--accent); }

        /* ── MAIN CONTENT ── */
        .main {
            flex: 1; overflow-y: auto; padding: 36px 40px; display: flex; flex-direction: column; gap: 32px;
        }

        /* ── TOP BAR ── */
        .topbar {
            display: flex; align-items: center; gap: 20px; justify-content: space-between;
        }
        .contact-info { display: flex; gap: 25px; font-size: 13px; font-weight: 600; color: var(--text-muted); }
        .contact-info div { display: flex; align-items: center; gap: 8px; }
        .contact-info i { color: var(--accent); }
        .topbar-links { display: flex; gap: 28px; align-items: center; margin-left: auto; }
        .topbar-links a {
            text-decoration: none; color: var(--text-muted); font-size: 13px; font-weight: 500; transition: color 0.2s;
        }
        .topbar-links a:hover { color: var(--text); }
        .btn-book-top {
            display: inline-flex; align-items: center; gap: 8px; background: var(--text); color: #fff;
            padding: 10px 22px; border-radius: 50px; font-size: 12px; font-weight: 600;
            text-decoration: none; letter-spacing: 0.05em; text-transform: uppercase; transition: all 0.25s;
            box-shadow: 0 4px 16px rgba(117, 128, 156, 0.25);
        }
        .btn-book-top:hover {
            background: var(--accent); transform: translateY(-2px); box-shadow: 0 8px 20px rgba(117, 128, 156, 0.4);
        }

        .page-title {
            font-family: 'Bricolage Grotesque', sans-serif; font-size: 2.8rem; font-weight: 700;
            color: var(--text); letter-spacing: -0.02em; margin-bottom: 10px;
        }

        /* ── SERVICES GRID (НОВИЙ ДИЗАЙН) ── */
        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
            align-items: start;
        }

        .category-card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--card-border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 30px;
            animation: fadeUp 0.5s ease both;
        }

        /* Анімація для почергової появи карток */
        .category-card:nth-child(2) { animation-delay: 0.1s; }
        .category-card:nth-child(3) { animation-delay: 0.2s; }
        .category-card:nth-child(4) { animation-delay: 0.3s; }
        .category-card:nth-child(5) { animation-delay: 0.4s; }

        .category-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(142, 153, 167, 0.2);
        }

        .category-header h2 {
            font-family: 'Bricolage Grotesque', sans-serif;
            margin: 0;
            font-size: 1.5rem;
            color: var(--text);
            letter-spacing: -0.01em;
        }

        .icon-main {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, rgba(117, 128, 156, 0.15), rgba(50, 50, 50, 0.1));
            border-radius: 12px;
            color: var(--accent);
            font-size: 18px;
        }

        /* Рядок послуги */
        .service-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 10px;
            border-radius: 12px;
            transition: all 0.3s ease;
            margin-bottom: 5px;
        }

        .service-item:hover {
            background: rgba(255,255,255,0.7);
            transform: translateX(5px);
            box-shadow: 0 4px 12px rgba(117, 128, 156, 0.05);
        }

        .service-info {
            flex: 1;
            padding-right: 15px;
        }

        .service-title {
            font-weight: 600;
            font-size: 13.5px;
            color: var(--text);
            display: block;
            margin-bottom: 4px;
        }

        .duration {
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .action-area {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .price-tag {
            font-family: 'Bricolage Grotesque', sans-serif;
            font-weight: 700;
            color: var(--accent);
            font-size: 15px;
        }

        /* Нова маленька кнопка запису */
        .book-btn-small {
            background: transparent;
            color: var(--text);
            border: 1px solid rgba(142, 153, 167, 0.4);
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .service-item:hover .book-btn-small {
            background: var(--text);
            color: #fff;
            border-color: var(--text);
            transform: rotate(90deg);
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(18px); }
            to { opacity: 1; transform: translateY(0); }
        }

    </style>
</head>
<body>

<aside class="sidebar">
    <div class="sidebar-logo"><span>Dunya</span> Beauty</div>

    <a th:href="@{/login}" class="sidebar-profile" sec:authorize="isAnonymous()">
        <div class="avatar"><i class="fas fa-user"></i></div>
        <div class="profile-name">Мій кабінет</div>
        <div class="profile-sub">Увійти / Реєстрація</div>
    </a>

    <a th:href="@{/profile}" class="sidebar-profile" sec:authorize="isAuthenticated()">
        <div class="avatar"><i class="fas fa-check"></i></div>
        <div class="profile-name" th:text="${clientName != null ? clientName : 'Гість'}">Ім'я Клієнта</div>
        <div class="profile-sub">Мій профіль</div>
    </a>

    <nav class="sidebar-nav">
        <a th:href="@{/}" class="nav-item">
            <i class="fas fa-home"></i> Головна
        </a>
        <a th:href="@{/services}" class="nav-item active">
            <i class="fas fa-spa"></i> Послуги
        </a>
        <a th:href="@{/masters}" class="nav-item">
            <i class="fas fa-magic"></i> Майстри
        </a>
        <a th:href="@{/reviews}" class="nav-item">
            <i class="fas fa-comment-dots"></i> Відгуки
        </a>
        <a th:href="@{/appointment}" class="nav-item">
            <i class="fas fa-calendar-check"></i> Записатись
        </a>
    </nav>

    <div class="sidebar-social">
        <a href="#"><i class="fab fa-instagram"></i></a>
        <a href="#"><i class="fab fa-facebook"></i></a>
        <a href="#"><i class="fab fa-telegram"></i></a>
    </div>
</aside>

<main class="main">

    <div class="topbar">
        <div class="contact-info">
            <div>
                <i class="fas fa-map-marker-alt"></i>
                <span>Київ, вул. Зої Бутенко, 6</span>
            </div>
            <div>
                <i class="fas fa-phone-alt"></i>
                <span>+38 (067) 000-67-67</span>
            </div>
        </div>
        <div class="topbar-links">
            <a th:href="@{/services}">Послуги</a>
            <a th:href="@{/masters}">Майстри</a>
            <a th:href="@{/reviews}">Відгуки</a>
        </div>
        <a th:href="@{/appointment}" class="btn-book-top">
            <i class="fas fa-calendar-plus"></i> Записатись
        </a>
    </div>

    <h1 class="page-title">Прайс-лист</h1>

    <div class="services-grid">

        <div class="category-card">
            <div class="category-header">
                <div class="icon-main"><i class="fas fa-hand-sparkles"></i></div>
                <h2>Нігтьовий сервіс</h2>
            </div>
            <div class="category-content">
                <div th:each="s : ${services}" th:if="${s.category == 'nails'}" class="service-item">
                    <div class="service-info">
                        <span class="service-title" th:text="${s.title}"></span>
                        <span class="duration"><i class="far fa-clock"></i> <span th:text="${s.duration} + ' хв'"></span></span>
                    </div>
                    <div class="action-area">
                        <span class="price-tag" th:text="${s.price} + ' ₴'"></span>
                        <a th:href="@{/appointment(serviceId=${s.id})}" class="book-btn-small" title="Записатись"><i class="fas fa-plus"></i></a>
                    </div>
                </div>
            </div>
        </div>

        <div class="category-card">
            <div class="category-header">
                <div class="icon-main"><i class="fas fa-palette"></i></div>
                <h2>Колористика</h2>
            </div>
            <div class="category-content">
                <div th:each="s : ${services}" th:if="${s.category == 'colorist'}" class="service-item">
                    <div class="service-info">
                        <span class="service-title" th:text="${s.title}"></span>
                        <span class="duration"><i class="far fa-clock"></i> <span th:text="${s.duration} + ' хв'"></span></span>
                    </div>
                    <div class="action-area">
                        <span class="price-tag" th:text="${s.price} + ' ₴'"></span>
                        <a th:href="@{/appointment(serviceId=${s.id})}" class="book-btn-small" title="Записатись"><i class="fas fa-plus"></i></a>
                    </div>
                </div>
            </div>
        </div>

        <div class="category-card">
            <div class="category-header">
                <div class="icon-main"><i class="fas fa-cut"></i></div>
                <h2>Стрижки & Укладки</h2>
            </div>
            <div class="category-content">
                <div th:each="s : ${services}" th:if="${s.category == 'female_cut' or s.category == 'male_cut'}" class="service-item">
                    <div class="service-info">
                        <span class="service-title" th:text="${s.title}"></span>
                        <span class="duration"><i class="far fa-clock"></i> <span th:text="${s.duration} + ' хв'"></span></span>
                    </div>
                    <div class="action-area">
                        <span class="price-tag" th:text="${s.price} + ' ₴'"></span>
                        <a th:href="@{/appointment(serviceId=${s.id})}" class="book-btn-small" title="Записатись"><i class="fas fa-plus"></i></a>
                    </div>
                </div>
            </div>
        </div>

        <div class="category-card">
            <div class="category-header">
                <div class="icon-main"><i class="fas fa-spa"></i></div>
                <h2>Косметологія</h2>
            </div>
            <div class="category-content">
                <div th:each="s : ${services}" th:if="${s.category == 'cosmetician'}" class="service-item">
                    <div class="service-info">
                        <span class="service-title" th:text="${s.title}"></span>
                        <span class="duration"><i class="far fa-clock"></i> <span th:text="${s.duration} + ' хв'"></span></span>
                    </div>
                    <div class="action-area">
                        <span class="price-tag" th:text="${s.price} + ' ₴'"></span>
                        <a th:href="@{/appointment(serviceId=${s.id})}" class="book-btn-small" title="Записатись"><i class="fas fa-plus"></i></a>
                    </div>
                </div>
            </div>
        </div>

        <div class="category-card">
            <div class="category-header">
                <div class="icon-main"><i class="fas fa-eye"></i></div>
                <h2>Перманентний макіяж</h2>
            </div>
            <div class="category-content">
                <div th:each="s : ${services}" th:if="${s.category == 'permanent'}" class="service-item">
                    <div class="service-info">
                        <span class="service-title" th:text="${s.title}"></span>
                        <span class="duration"><i class="far fa-clock"></i> <span th:text="${s.duration} + ' хв'"></span></span>
                    </div>
                    <div class="action-area">
                        <span class="price-tag" th:text="${s.price} + ' ₴'"></span>
                        <a th:href="@{/appointment(serviceId=${s.id})}" class="book-btn-small" title="Записатись"><i class="fas fa-plus"></i></a>
                    </div>
                </div>
            </div>
        </div>

    </div>

</main>

</body>
</html>
