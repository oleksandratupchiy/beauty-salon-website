<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Відновлення пароля | DUNYA BEAUTY</title>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --card-bg: rgba(255,255,255,0.6); --card-border: rgba(255,255,255,0.85); --accent: #75809C; --text: #323232; --text-muted: #8E99A7; --danger: #e74c3c; --radius: 22px; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background: #dcdddd; min-height: 100vh; display: flex; align-items: center; justify-content: center; color: var(--text); }
        .auth-wrapper { width: 100%; max-width: 400px; margin: auto; padding: 20px; }
        .auth-card { background: var(--card-bg); backdrop-filter: blur(16px); border: 1px solid var(--card-border); padding: 45px 40px; border-radius: var(--radius); text-align: center; box-shadow: 0 8px 32px rgba(117, 128, 156, 0.12); }
        .logo { font-family: 'Bricolage Grotesque', sans-serif; font-size: 22px; font-weight: 700; text-transform: uppercase; margin-bottom: 25px; color: var(--text); }
        .logo span { color: var(--accent); }
        h2 { font-family: 'Bricolage Grotesque', sans-serif; font-size: 1.4rem; margin-bottom: 10px; font-weight: 600; }
        .sub-text { font-size: 13px; color: var(--text-muted); margin-bottom: 25px; line-height: 1.5; }
        input { width: 100%; padding: 15px; margin-bottom: 15px; border: 1px solid rgba(142, 153, 167, 0.3); border-radius: 12px; background: rgba(255,255,255,0.7); outline: none; font-family: 'Montserrat', sans-serif; font-size: 14px; }
        input:focus { border-color: var(--accent); background: #fff; }
        .btn-auth { width: 100%; background: var(--text); color: white; padding: 15px; border: none; border-radius: 50px; cursor: pointer; font-weight: 600; font-family: 'Montserrat', sans-serif; font-size: 13px; text-transform: uppercase; margin-top: 10px; }
        .btn-auth:hover { background: var(--accent); }
        .switch-text { margin-top: 25px; font-size: 13px; }
        .switch-text a { color: var(--accent); text-decoration: none; font-weight: 700; }
        .alert { font-size: 12px; font-weight: 600; padding: 12px; border-radius: 12px; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; gap: 8px; text-align: left; line-height: 1.4; }
        .error { background: rgba(231, 76, 60, 0.1); color: var(--danger); border: 1px solid rgba(231, 76, 60, 0.2); }
    </style>
</head>
<body>
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="logo"><span>Dunya</span> Beauty</div>
        <h2>Відновлення пароля</h2>
        <p class="sub-text">Введіть email, який ви використовували при реєстрації, і ми надішлемо вам посилання для створення нового пароля.</p>

        <div th:if="${param.error}" class="alert error">
            <i class="fas fa-exclamation-circle"></i> Користувача з такою поштою не знайдено.
        </div>

        <div th:if="${param.mail_error}" class="alert error">
            <i class="fas fa-exclamation-circle"></i> Помилка сервера. Не вдалося відправити лист.
        </div>

        <form th:action="@{/forgot-password}" method="post">
            <input type="email" name="email" placeholder="Ваш Email" required>
            <button type="submit" class="btn-auth">Відправити посилання</button>
        </form>

        <div class="switch-text"><a th:href="@{/login}"><i class="fas fa-arrow-left"></i> Повернутися до входу</a></div>
    </div>
</div>
</body>
</html>
